model:
  type: "resnet32"
  num_classes: 10  # CIFAR-10
  
training:
  epochs: 400
  batch_size: 128
  lr_schedule:
    milestones: [150, 250]
    gamma: 0.1
  augmentation:
    random_crop_padding: 4
    horizontal_flip: true
    
optimizer:
  lr: 1e-3
  beta1: 0.9
  beta2: 0.999
  epsilon: 1e-8
  betas_aggmo: [0.0, 0.9, 0.99]
  weight_decay: 0.0005
